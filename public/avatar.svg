<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#lightGradient)" opacity="0.2"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="85" fill="url(#lightGradient)"/>
  
  <!-- Light bulb shape for "Light Speed" theme -->
  <g transform="translate(100, 100)">
    <!-- Bulb -->
    <circle cx="0" cy="-15" r="25" fill="#fff" opacity="0.95"/>
    
    <!-- Filament glow -->
    <circle cx="0" cy="-15" r="25" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    
    <!-- Base threads -->
    <rect x="-12" y="12" width="24" height="6" fill="#fff" opacity="0.8" rx="2"/>
    <rect x="-12" y="20" width="24" height="4" fill="#fff" opacity="0.6" rx="1"/>
    
    <!-- Light rays -->
    <line x1="0" y1="-45" x2="0" y2="-55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="32" y1="-32" x2="40" y2="-40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="32" y1="-32" x2="45" y2="-25" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="-32" y1="-32" x2="-40" y2="-40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="-32" y1="-32" x2="-45" y2="-25" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>